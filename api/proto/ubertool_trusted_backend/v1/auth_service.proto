syntax = "proto3";

package ubertool.trusted.api.v1;

import "google/protobuf/timestamp.proto";
import "ubertool_trusted_backend/v1/ubertool_schema.proto";

option go_package = "ubertool-backend-trusted/api/gen/v1;ubertool_v1";

option java_multiple_files = true;
option java_package = "com.ubertool.trusted.api.v1";
option java_outer_classname = "AuthServiceProto";

// Authentication service
service AuthService {
  // Validate invitation code before signup
  // No access_token required
  rpc ValidateInvite(ValidateInviteRequest) returns (ValidateInviteResponse);

  // Request to join organization
  // No access_token required
  rpc RequestToJoinOrganization(RequestToJoinRequest) returns (VanilaResponse);

  // User register after invitation and signup an organization
  // No access_token required
  rpc UserSignup(SignupRequest) returns (VanilaResponse);

  // Login with email and password
  // No access_token required
  rpc Login(LoginRequest) returns (LoginResponse);

  // Verify 2FA code
  // 2FA token required
  rpc Verify2FA(Verify2FARequest) returns (Verify2FAResponse);

  // Refresh access token
  // RefreshToken sent in metadata
  rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse);

  // User request to change password
  // AccessToken required
  rpc ChangePassword(ChangePasswordRequest) returns (VanilaResponse);

  // user request to reset password by an Admin
  // No access_token required
  rpc ResetPassword(ResetPasswordRequest) returns (VanilaResponse);

  // Logout
  // AccessToken required
  rpc Logout(LogoutRequest) returns (VanilaResponse);
}

// Validate invitation request
message ValidateInviteRequest {
  string invitation_code = 1;
  string email = 2;
}

// Validate invitation response
message ValidateInviteResponse {
  bool valid = 1;
  string message = 2;
  User user = 3;
}

// Login request
message LoginRequest {
  string email = 1;
  string password = 2;
}

// Login response
message LoginResponse {
  bool success = 1;
  string two_fa_token = 2;
  google.protobuf.Timestamp expires_at = 3;
  string message = 4;
}

// 2FA verification request
// two_fa_token is in the request header
message Verify2FARequest {
  string two_fa_code = 1;
}

// 2FA verification response
message Verify2FAResponse {
  bool success = 1;
  string access_token = 2;
  string refresh_token = 3;
  google.protobuf.Timestamp expires_at = 4;
  User user = 5;
  bool reset_password = 6;
}

// Signup request
message SignupRequest {
  string invitation_code = 1;
  string name = 2;
  string email = 3;
  string phone = 4;
  string password = 5;
}

// Refresh token request
message RefreshTokenRequest {
  // refresh_token sent in metadata
}

// Refresh token response
message RefreshTokenResponse {
  string access_token = 1;
  string refresh_token = 2;
}

// Logout request
message LogoutRequest {
  // Android device unique identifier (Settings.Secure.ANDROID_ID).
  // Backend uses this to mark the device's FCM token as OBSOLETE so
  // push notifications are no longer routed to a logged-out device.
  string android_device_id = 1;
}

// Request to join request
message RequestToJoinRequest {
  int32 organization_id = 1;
  string name = 2;
  string email = 3;
  string message = 4;
  string admin_email = 5; 
}

message ChangePasswordRequest {
  string old_password = 1;
  string new_password = 2;
}

message ResetPasswordRequest {
  string user_email = 1;
}

